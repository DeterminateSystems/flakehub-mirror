on:
  workflow_dispatch:

jobs:
  mirror_tags:
    name: Tag ${{ matrix.repo }} (Test)
    strategy:
      fail-fast: false
      matrix:
        repo:
          # Please keep this sorted.
          - grahamc/test7
    runs-on: ubuntu-latest
    permissions:
      contents: write # In order to upload artifacts to GitHub releases
      id-token: write # In order to request a JWT for AWS auth
    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main
      - uses: oprypin/find-latest-tag@6957ac556fa6d349727ecabfcaaf9f8e5ee37124 # v1.1.3
        with:
          repository: ${{ matrix.repo }}
        id: tagfetch

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ steps.tagfetch.outputs.tag }}
          persist-credentials: false

      - name: Release to FlakeHub
        uses: DeterminateSystems/flakehub-push@detsys-ts
        with:
          mirror: true
          visibility: public
          repository: ${{ matrix.repo }}
          tag: ${{ steps.tagfetch.outputs.tag }}
          log-directives: flakehub_push=trace
          logger: pretty

  rolling:
    name: Branch ${{ matrix.repo }}#${{ matrix.branch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Please keep this sorted.
          - repo: grahamc/test7
            branch: main

    runs-on: ubuntu-latest
    permissions:
      contents: write # In order to upload artifacts to GitHub releases
      id-token: write # In order to request a JWT for AWS auth
    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.branch }}
          persist-credentials: false

      - name: Release to FlakeHub
        uses: DeterminateSystems/flakehub-push@detsys-ts
        with:
          mirror: true
          visibility: public
          repository: ${{ matrix.repo }}
          rolling: true
          rolling-minor: ${{ matrix.rolling-minor }}
          log-directives: flakehub_push=trace
          logger: pretty
